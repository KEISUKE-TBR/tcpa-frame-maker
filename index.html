<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOBIRAPOLIS 先行体験フレームメーカー</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: #1a1a2e;
    color: #f5f3ee;
    padding: 32px;
    min-height: 100vh;
    position: relative;
  }

  /* 背景アニメーション（画面全体、固定） */
  .bg-anim {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
    pointer-events: none;
  }

  .container { max-width: 1280px; margin: 0 auto; position: relative; z-index: 1; }
  header {
    text-align: center;
    margin-bottom: 36px;
  }
  h1 {
    font-size: 28px;
    font-weight: 500;
    letter-spacing: 4px;
    margin-bottom: 8px;
    color: #c9a04a;
  }
  .subtitle {
    font-size: 14px;
    color: #aaa;
    letter-spacing: 3px;
  }
  .workspace {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 28px;
    align-items: start;
  }
  @media (max-width: 900px) {
    .workspace { grid-template-columns: 1fr; }
  }

  .canvas-area {
    background: rgba(45, 45, 78, 0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 0.5px solid rgba(201, 160, 74, 0.15);
    border-radius: 10px;
    padding: 18px;
  }
  .canvas-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background:
      repeating-conic-gradient(#3a3a5e 0% 25%, #44446e 25% 50%) 50% / 30px 30px;
    border-radius: 4px;
    overflow: hidden;
    cursor: move;
  }
  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    display: block;
  }
  .placeholder {
    position: absolute;
    top: 50%;
    left: 35%;
    transform: translate(-50%, -50%);
    color: #aaa;
    font-size: 16px;
    pointer-events: none;
    text-align: center;
    line-height: 1.8;
  }

  .controls {
    background: rgba(45, 45, 78, 0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 0.5px solid rgba(201, 160, 74, 0.15);
    border-radius: 10px;
    padding: 24px;
  }
  .section { margin-bottom: 26px; }
  .section:last-child { margin-bottom: 0; }
  .section-title {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 2px;
    color: #c9a04a;
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  button, .btn {
    width: 100%;
    padding: 13px 16px;
    border: 0.5px solid rgba(255,255,255,0.2);
    background: #1a1a2e;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    color: #f5f3ee;
    text-align: center;
    display: block;
    transition: background 0.15s;
  }
  button:hover, .btn:hover { background: #444466; }
  button.primary {
    background: #c9a04a;
    color: #1a1a2e;
    border-color: #c9a04a;
    font-weight: 500;
    font-size: 15px;
    padding: 15px 16px;
  }
  button.primary:hover { background: #d9b05a; }
  button:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Xシェアボタン */
  button.x-share {
    background: #000;
    color: #fff;
    border-color: #000;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }
  button.x-share:hover { background: #222; }
  button.x-share:disabled { background: #444; color: #888; }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .slider-label {
    font-size: 12px;
    color: #aaa;
    width: 48px;
    flex-shrink: 0;
  }
  .slider-value {
    font-size: 12px;
    color: #c9a04a;
    width: 44px;
    text-align: right;
    flex-shrink: 0;
  }
  input[type="range"] {
    flex: 1;
    accent-color: #c9a04a;
  }
  input[type="text"] {
    width: 100%;
    padding: 11px 13px;
    border: 0.5px solid rgba(255,255,255,0.2);
    background: #1a1a2e;
    border-radius: 4px;
    font-size: 14px;
    font-family: inherit;
    color: #f5f3ee;
  }
  input[type="text"]:focus {
    outline: none;
    border-color: #c9a04a;
  }
  .hint {
    font-size: 12px;
    color: #888;
    margin-top: 10px;
    line-height: 1.6;
  }
  .file-input { display: none; }

  footer {
    text-align: center;
    margin-top: 32px;
    font-size: 11px;
    color: #666;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<!-- 背景アニメーション（画面全体の固定背景） -->
<svg class="bg-anim" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

      <stop offset="0%" stop-color="#c9a04a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c9a04a" stop-opacity="0"/>

  </defs>

  <g fill="none" stroke="#c9a04a" stroke-width="0.5" opacity="0.18">
    <polygon points="200,400 280,355 360,400 360,500 280,545 200,500">
      <animateTransform attributeName="transform" type="rotate" from="0 280 450" to="360 280 450" dur="80s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="1000,200 1100,145 1200,200 1200,320 1100,375 1000,320">
      <animateTransform attributeName="transform" type="rotate" from="360 1100 260" to="0 1100 260" dur="90s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="1300,700 1380,655 1460,700 1460,800 1380,845 1300,800">

    </polygon>

  <!-- 中: 中サイズの多角形 -->
  <g fill="none" stroke="#c9a04a" stroke-width="0.5">
    <polygon points="700,500 730,480 760,500 760,540 730,560 700,540" opacity="0.35">
      <animateTransform attributeName="transform" type="rotate" from="0 730 520" to="360 730 520" dur="30s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.5;0.15" dur="8s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="1400,300 1430,280 1460,300 1460,340 1430,360 1400,340" opacity="0.35">
      <animateTransform attributeName="transform" type="rotate" from="360 1430 320" to="0 1430 320" dur="35s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.5;0.15" dur="7s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="100,150 124,134 148,150 148,182 124,198 100,182" opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" from="0 124 166" to="360 124 166" dur="32s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="9s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="500,850 525,834 550,850 550,882 525,898 500,882" opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" from="360 525 866" to="0 525 866" dur="40s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="10s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- 手前: 光の粒子 -->
  <g>
    <circle cx="160" cy="600" r="3" fill="url(#bgParticle)">
      <animate attributeName="cy" values="600;560;600" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="120" r="2.5" fill="url(#bgParticle)">
      <animate attributeName="cy" values="120;90;120" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="200" r="3.5" fill="url(#bgParticle)">
      <animate attributeName="cy" values="200;160;200" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;1;0.4" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="800" r="2.5" fill="url(#bgParticle)">
      <animate attributeName="cy" values="800;760;800" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1240" cy="720" r="3" fill="url(#bgParticle)">
      <animate attributeName="cy" values="720;680;720" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.95;0.3" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1500" cy="120" r="2.5" fill="url(#bgParticle)">
      <animate attributeName="cy" values="120;90;120" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="360" cy="800" r="2" fill="url(#bgParticle)">
      <animate attributeName="cy" values="800;770;800" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="640" cy="800" r="2.5" fill="url(#bgParticle)">
      <animate attributeName="cy" values="800;760;800" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1100" cy="400" r="2.5" fill="url(#bgParticle)">
      <animate attributeName="cy" values="400;360;400" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="350" r="2" fill="url(#bgParticle)">
      <animate attributeName="cy" values="350;320;350" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1450" cy="500" r="3" fill="url(#bgParticle)">
      <animate attributeName="cy" values="500;460;500" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" cy="900" r="2" fill="url(#bgParticle)">
      <animate attributeName="cy" values="900;870;900" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="7s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>

<div class="container">

<header>
  <h1>FRAME MAKER</h1>
  <div class="subtitle">TCP 先行体験会</div>
</header>

<div class="workspace">

  <div class="canvas-area">
    <div class="canvas-wrapper" id="canvasWrapper">
      <canvas id="canvas" width="1920" height="1080"></canvas>
      <div class="placeholder" id="placeholder">↓ 右のメニューから<br>作品（スクリーンショット）を<br>アップロードしてください</div>
    </div>
  </div>

  <div class="controls">

    <div class="section">
      <div class="section-title">1. 作品をアップロード</div>
      <label class="btn" for="imageInput">画像を選ぶ</label>
      <input type="file" class="file-input" id="imageInput" accept="image/*">
      <div class="hint">JPG / PNG / WebP 対応</div>
    </div>

    <div class="section">
      <div class="section-title">2. 位置・サイズ調整</div>
      <div class="slider-row">
        <span class="slider-label">サイズ</span>
        <input type="range" id="scaleSlider" min="10" max="300" value="100">
        <span class="slider-value" id="scaleValue">100%</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">横位置</span>
        <input type="range" id="xSlider" min="-100" max="100" value="0">
        <span class="slider-value" id="xValue">0</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">縦位置</span>
        <input type="range" id="ySlider" min="-100" max="100" value="0">
        <span class="slider-value" id="yValue">0</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">回転</span>
        <input type="range" id="rotSlider" min="-180" max="180" value="0">
        <span class="slider-value" id="rotValue">0°</span>
      </div>
      <div style="display:flex; gap:8px; margin-top:8px;">
        <button id="rotL90Btn" style="flex:1; padding:9px; font-size:12px;">↺ -90°</button>
        <button id="rotR90Btn" style="flex:1; padding:9px; font-size:12px;">↻ +90°</button>
        <button id="resetBtn" style="flex:1; padding:9px; font-size:12px;">リセット</button>
      </div>
      <div class="hint">💡 プレビューをドラッグでも動かせます</div>
    </div>

    <div class="section">
      <div class="section-title">3. 作品タイトル（任意）</div>
      <input type="text" id="titleInput" placeholder="例: ぼくのTOBIRAPOLIS" maxlength="60">
    </div>

    <div class="section">
      <div class="section-title">4. 作者名・チーム名（任意）</div>
      <input type="text" id="nameInput" placeholder="例: いぬたぬき" maxlength="100">
    </div>

    <div class="section">
      <div class="section-title">5. ダウンロード & シェア</div>
      <button class="primary" id="downloadBtn" disabled>PNGをダウンロード</button>
      <button class="x-share" id="xShareBtn" disabled style="margin-top:8px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-2px; margin-right:6px;">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>Xでシェアする
      </button>
      <div class="hint" id="shareHint">
        💡 ダウンロードした画像をXの投稿画面でドラッグ&ドロップで添付してください
      </div>
    </div>

  </div>
</div>

<footer>©Tobiratory ©TOBIRAPOLIS2026</footer>

</div>

const state = {
  userImage: null,
  frameImage: null,
  scale: 1.0,
  offsetX: 0,
  offsetY: 0,
  rotation: 0,        // 回転角度（度、-180〜180）
  authorName: '',
  workTitle: '',
  isDragging: false,
  dragStartX: 0,
  dragStartY: 0,
  initialOffsetX: 0,
  initialOffsetY: 0,
};

// テキストを指定幅で折り返し、最大行数で切り捨て（最終行に…を追加）
// 日本語と英語の混在に対応するため、1文字ずつ判定する方式
function wrapText(ctx, text, maxWidth, maxLines) {
  const lines = [];
  let currentLine = '';

  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const testLine = currentLine + char;
    const testWidth = ctx.measureText(testLine).width;

    if (testWidth >= maxWidth && currentLine.length > 0) {
      lines.push(currentLine);
      currentLine = char;
      if (lines.length >= maxLines) {
        // 最終行に到達。残りを最終行に詰めて、はみ出たら…で切る
        currentLine = lines.pop();
        for (let j = i; j < text.length; j++) {
          const tryLine = currentLine + text[j];
          if (ctx.measureText(tryLine + '…').width > maxWidth) {
            lines.push(currentLine + '…');
            return lines;
          }
          currentLine = tryLine;
        }
        lines.push(currentLine);
        return lines;
      }
    } else {
      currentLine = testLine;
    }
  }
  if (currentLine.length > 0) lines.push(currentLine);
  return lines;
}

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

// フレーム画像をロード
function loadFrame() {
  const img = new Image();
  img.onload = () => {
    state.frameImage = img;
    redraw();
  };
  img.src = 'data:image/png;base64,' + FRAME_B64;
}

function redraw() {
  ctx.clearRect(0, 0, W, H);

  // 1. 作品画像（フレーム全体 1920x1080 にフィット、クリップなし、回転対応）
  if (state.userImage) {
    const img = state.userImage;
    const scaleToFit = Math.max(W / img.width, H / img.height);
    const baseW = img.width * scaleToFit;
    const baseH = img.height * scaleToFit;
    const drawW = baseW * state.scale;
    const drawH = baseH * state.scale;
    const cx = W/2 + state.offsetX * W/2;
    const cy = H/2 + state.offsetY * H/2;

    if (state.rotation !== 0) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(state.rotation * Math.PI / 180);
      ctx.drawImage(img, -drawW/2, -drawH/2, drawW, drawH);
      ctx.restore();
    } else {
      ctx.drawImage(img, cx - drawW/2, cy - drawH/2, drawW, drawH);
    }
  }

  // 2. フレーム
  if (state.frameImage) {
    ctx.drawImage(state.frameImage, 0, 0, W, H);
  }

  // 3a. 作品名（MAY 2026 の下、赤枠の上部、左上寄せ）
  //     エリア: x:1631〜1891 (幅260)
  //     最大2行、フォントサイズ可変（24px→14pxまで縮小）
  if (state.workTitle.trim()) {
    ctx.fillStyle = '#c9a04a';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';

    const maxWidth = 260;
    const maxLines = 2;
    const minFontSize = 14;
    const maxFontSize = 24;
    const leftX = 1631;
    const topY = 645;     // 赤枠上端(642)からわずかに下

    const titleText = state.workTitle.trim();

    let fontSize = maxFontSize;
    let lines = [];
    while (fontSize >= minFontSize) {
      ctx.font = `500 ${fontSize}px -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif`;
      const tryLines = wrapText(ctx, titleText, maxWidth, maxLines);
      const hasEllipsis = tryLines.length > 0 && tryLines[tryLines.length - 1].endsWith('…');
      if (!hasEllipsis) {
        lines = tryLines;
        break;
      }
      fontSize -= 1;
    }
    if (lines.length === 0) {
      fontSize = minFontSize;
      ctx.font = `500 ${fontSize}px -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif`;
      lines = wrapText(ctx, titleText, maxWidth, maxLines);
    }

    const lineHeight = fontSize * 1.3;
    // 上から順に描画
    for (let i = 0; i < lines.length; i++) {
      const y = topY + i * lineHeight;
      ctx.fillText(lines[i], leftX, y);
    }
  }

  // 3b. 作者名（タイトルの下、ハッシュタグの上、左上寄せ）
  //     エリア: x:1631〜1891 (幅260)
  //     フォント18px、最大4行
  if (state.authorName.trim()) {
    ctx.fillStyle = '#c9a04a';
    const fontSize = 18;
    ctx.font = `500 ${fontSize}px -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';

    const maxWidth = 260;
    const maxLines = 4;
    const lineHeight = fontSize * 1.3;
    const leftX = 1631;
    const topY = 720;     // タイトルエリア(645-685)の下、余裕を持って配置

    const fullText = 'by ' + state.authorName.trim();
    const lines = wrapText(ctx, fullText, maxWidth, maxLines);

    // 上から順に描画
    for (let i = 0; i < lines.length; i++) {
      const y = topY + i * lineHeight;
      ctx.fillText(lines[i], leftX, y);
    }
  }

  document.getElementById('placeholder').style.display = state.userImage ? 'none' : 'block';
}

// ===== イベント =====
document.getElementById('imageInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      state.userImage = img;
      resetTransform();
      redraw();
      updateDownloadBtn();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

function resetTransform() {
  state.scale = 1.0;
  state.offsetX = 0;
  state.offsetY = 0;
  state.rotation = 0;
  document.getElementById('scaleSlider').value = 100;
  document.getElementById('xSlider').value = 0;
  document.getElementById('ySlider').value = 0;
  document.getElementById('rotSlider').value = 0;
  updateSliderLabels();
}

document.getElementById('resetBtn').addEventListener('click', () => {
  resetTransform();
  redraw();
});

document.getElementById('rotSlider').addEventListener('input', (e) => {
  state.rotation = parseInt(e.target.value);
  updateSliderLabels();
  redraw();
});

document.getElementById('rotL90Btn').addEventListener('click', () => {
  // -90度（範囲を-180〜180に正規化）
  let r = state.rotation - 90;
  if (r < -180) r += 360;
  state.rotation = r;
  document.getElementById('rotSlider').value = r;
  updateSliderLabels();
  redraw();
});

document.getElementById('rotR90Btn').addEventListener('click', () => {
  let r = state.rotation + 90;
  if (r > 180) r -= 360;
  state.rotation = r;
  document.getElementById('rotSlider').value = r;
  updateSliderLabels();
  redraw();
});

document.getElementById('scaleSlider').addEventListener('input', (e) => {
  state.scale = parseInt(e.target.value) / 100;
  updateSliderLabels();
  redraw();
});
document.getElementById('xSlider').addEventListener('input', (e) => {
  state.offsetX = parseInt(e.target.value) / 100;
  updateSliderLabels();
  redraw();
});
document.getElementById('ySlider').addEventListener('input', (e) => {
  state.offsetY = parseInt(e.target.value) / 100;
  updateSliderLabels();
  redraw();
});

function updateSliderLabels() {
  document.getElementById('scaleValue').textContent = Math.round(state.scale * 100) + '%';
  document.getElementById('xValue').textContent = Math.round(state.offsetX * 100);
  document.getElementById('yValue').textContent = Math.round(state.offsetY * 100);
  document.getElementById('rotValue').textContent = Math.round(state.rotation) + '°';
}

document.getElementById('nameInput').addEventListener('input', (e) => {
  state.authorName = e.target.value;
  redraw();
});

document.getElementById('titleInput').addEventListener('input', (e) => {
  state.workTitle = e.target.value;
  redraw();
});

// ドラッグ
const wrapper = document.getElementById('canvasWrapper');
wrapper.addEventListener('mousedown', startDrag);
wrapper.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) startDrag(e.touches[0]);
}, { passive: true });

function startDrag(e) {
  if (!state.userImage) return;
  state.isDragging = true;
  state.dragStartX = e.clientX;
  state.dragStartY = e.clientY;
  state.initialOffsetX = state.offsetX;
  state.initialOffsetY = state.offsetY;
}

document.addEventListener('mousemove', (e) => doDrag(e));
document.addEventListener('touchmove', (e) => {
  if (e.touches.length === 1) doDrag(e.touches[0]);
}, { passive: true });

function doDrag(e) {
  if (!state.isDragging) return;
  const rect = wrapper.getBoundingClientRect();
  const dx = (e.clientX - state.dragStartX) / rect.width * 2;
  const dy = (e.clientY - state.dragStartY) / rect.height * 2;
  state.offsetX = Math.max(-1, Math.min(1, state.initialOffsetX + dx));
  state.offsetY = Math.max(-1, Math.min(1, state.initialOffsetY + dy));
  document.getElementById('xSlider').value = Math.round(state.offsetX * 100);
  document.getElementById('ySlider').value = Math.round(state.offsetY * 100);
  updateSliderLabels();
  redraw();
}

document.addEventListener('mouseup', () => { state.isDragging = false; });
document.addEventListener('touchend', () => { state.isDragging = false; });

function updateDownloadBtn() {
  const hasImage = !!state.userImage;
  document.getElementById('downloadBtn').disabled = !hasImage;
  document.getElementById('xShareBtn').disabled = !hasImage;
}

// ファイル名生成（ダウンロード・シェア共通）
function makeFilename() {
  const dateStr = new Date().toISOString().slice(0,10);
  const rawName = state.authorName.trim();
  const safeName = rawName.replace(/[^a-zA-Z0-9_]/g, '') || 'work';
  return 'TCPA_' + safeName + '_' + dateStr + '.png';
}

// 画像をダウンロード
function downloadCanvas() {
  const dataUrl = canvas.toDataURL('image/png');
  const link = document.createElement('a');
  link.download = makeFilename();
  link.href = dataUrl;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

document.getElementById('downloadBtn').addEventListener('click', () => {
  try {
    downloadCanvas();
  } catch (err) {
    alert('ダウンロードに失敗しました: ' + err.message);
    console.error(err);
  }
});

// Xシェアボタン
document.getElementById('xShareBtn').addEventListener('click', () => {
  try {
    // 先にダウンロード（ユーザーがX投稿で添付するため）
    downloadCanvas();

    // 投稿文を組み立て
    const title = state.workTitle.trim();
    const author = state.authorName.trim();
    const hashtags = '#TCP先行体験会 #Tobiratory #TOBIRAPOLIS';

    let text = '';
    if (title) text += '「' + title + '」';
    if (author) text += (text ? ' by ' : 'by ') + author;
    if (text) text += '\n\n';
    text += 'TCP先行体験会で作ってみた！\n' + hashtags;

    // X投稿画面を開く（intentURL）
    const url = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text);
    window.open(url, '_blank', 'noopener,noreferrer');
  } catch (err) {
    alert('シェアに失敗しました: ' + err.message);
    console.error(err);
  }
});

loadFrame();
</script>
