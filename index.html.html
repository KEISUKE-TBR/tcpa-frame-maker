<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOBIRAPOLIS 先行体験フレームメーカー</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: #1a1a2e;
    color: #f5f3ee;
    padding: 24px;
    min-height: 100vh;
  }
  .container { max-width: 1000px; margin: 0 auto; }
  header {
    text-align: center;
    margin-bottom: 28px;
  }
  h1 {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 3px;
    margin-bottom: 6px;
    color: #c9a04a;
  }
  .subtitle {
    font-size: 11px;
    color: #888;
    letter-spacing: 2px;
  }
  .workspace {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 20px;
    align-items: start;
  }
  @media (max-width: 768px) {
    .workspace { grid-template-columns: 1fr; }
  }

  .canvas-area {
    background: #2d2d4e;
    border-radius: 8px;
    padding: 14px;
  }
  .canvas-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background:
      repeating-conic-gradient(#3a3a5e 0% 25%, #44446e 25% 50%) 50% / 30px 30px;
    border-radius: 4px;
    overflow: hidden;
    cursor: move;
  }
  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    display: block;
  }
  .placeholder {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #aaa;
    font-size: 13px;
    pointer-events: none;
    text-align: center;
    line-height: 1.8;
  }

  .controls {
    background: #2d2d4e;
    border-radius: 8px;
    padding: 20px;
  }
  .section { margin-bottom: 22px; }
  .section:last-child { margin-bottom: 0; }
  .section-title {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    color: #c9a04a;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  button, .btn {
    width: 100%;
    padding: 11px 14px;
    border: 0.5px solid rgba(255,255,255,0.2);
    background: #1a1a2e;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    color: #f5f3ee;
    text-align: center;
    display: block;
    transition: background 0.15s;
  }
  button:hover, .btn:hover { background: #444466; }
  button.primary {
    background: #c9a04a;
    color: #1a1a2e;
    border-color: #c9a04a;
    font-weight: 500;
  }
  button.primary:hover { background: #d9b05a; }
  button:disabled { opacity: 0.35; cursor: not-allowed; }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .slider-label {
    font-size: 11px;
    color: #aaa;
    width: 44px;
    flex-shrink: 0;
  }
  .slider-value {
    font-size: 11px;
    color: #c9a04a;
    width: 40px;
    text-align: right;
    flex-shrink: 0;
  }
  input[type="range"] {
    flex: 1;
    accent-color: #c9a04a;
  }
  input[type="text"] {
    width: 100%;
    padding: 9px 11px;
    border: 0.5px solid rgba(255,255,255,0.2);
    background: #1a1a2e;
    border-radius: 4px;
    font-size: 13px;
    font-family: inherit;
    color: #f5f3ee;
  }
  input[type="text"]:focus {
    outline: none;
    border-color: #c9a04a;
  }
  .hint {
    font-size: 11px;
    color: #888;
    margin-top: 8px;
    line-height: 1.5;
  }
  .file-input { display: none; }

  footer {
    text-align: center;
    margin-top: 28px;
    font-size: 10px;
    color: #666;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<div class="container">

<header>
  <h1>FRAME MAKER</h1>
  <div class="subtitle">TCP 先行体験会 SNS投稿用</div>
</header>

<div class="workspace">

  <div class="canvas-area">
    <div class="canvas-wrapper" id="canvasWrapper">
      <canvas id="canvas" width="1920" height="1080"></canvas>
      <div class="placeholder" id="placeholder">↓ 右のメニューから<br>作品画像をアップロードしてください</div>
    </div>
  </div>

  <div class="controls">

    <div class="section">
      <div class="section-title">1. 作品をアップロード</div>
      <label class="btn" for="imageInput">画像を選ぶ</label>
      <input type="file" class="file-input" id="imageInput" accept="image/*">
      <div class="hint">JPG / PNG / WebP 対応</div>
    </div>

    <div class="section">
      <div class="section-title">2. 位置・サイズ調整</div>
      <div class="slider-row">
        <span class="slider-label">サイズ</span>
        <input type="range" id="scaleSlider" min="10" max="300" value="100">
        <span class="slider-value" id="scaleValue">100%</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">横位置</span>
        <input type="range" id="xSlider" min="-100" max="100" value="0">
        <span class="slider-value" id="xValue">0</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">縦位置</span>
        <input type="range" id="ySlider" min="-100" max="100" value="0">
        <span class="slider-value" id="yValue">0</span>
      </div>
      <div class="slider-row">
        <span class="slider-label">回転</span>
        <input type="range" id="rotSlider" min="-180" max="180" value="0">
        <span class="slider-value" id="rotValue">0°</span>
      </div>
      <div style="display:flex; gap:6px; margin-top:6px;">
        <button id="rotL90Btn" style="flex:1; padding:7px; font-size:11px;">↺ -90°</button>
        <button id="rotR90Btn" style="flex:1; padding:7px; font-size:11px;">↻ +90°</button>
        <button id="resetBtn" style="flex:1; padding:7px; font-size:11px;">リセット</button>
      </div>
      <div class="hint">💡 プレビューをドラッグでも動かせます</div>
    </div>

    <div class="section">
      <div class="section-title">3. 作者名・チーム名（任意）</div>
      <input type="text" id="nameInput" placeholder="例: いぬたぬき" maxlength="100">
      <div class="hint">右側のロゴ下に表示<br>幅325px / 最大4行（超えた分は…で省略）</div>
    </div>

    <div class="section">
      <div class="section-title">4. ダウンロード</div>
      <button class="primary" id="downloadBtn" disabled>PNGをダウンロード</button>
    </div>

  </div>
</div>

<footer>TOBIRAPOLIS CREATIVE AWARD VOL.0 / FIRST EDITION</footer>

</div>

const state = {
  userImage: null,
  frameImage: null,
  scale: 1.0,
  offsetX: 0,
  offsetY: 0,
  rotation: 0,        // 回転角度（度、-180〜180）
  authorName: '',
  isDragging: false,
  dragStartX: 0,
  dragStartY: 0,
  initialOffsetX: 0,
  initialOffsetY: 0,
};

// テキストを指定幅で折り返し、最大行数で切り捨て（最終行に…を追加）
// 日本語と英語の混在に対応するため、1文字ずつ判定する方式
function wrapText(ctx, text, maxWidth, maxLines) {
  const lines = [];
  let currentLine = '';

  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const testLine = currentLine + char;
    const testWidth = ctx.measureText(testLine).width;

    if (testWidth > maxWidth && currentLine.length > 0) {
      lines.push(currentLine);
      currentLine = char;
      if (lines.length >= maxLines) {
        // 最終行に到達。残りを最終行に詰めて、はみ出たら…で切る
        currentLine = lines.pop();
        for (let j = i; j < text.length; j++) {
          const tryLine = currentLine + text[j];
          if (ctx.measureText(tryLine + '…').width > maxWidth) {
            lines.push(currentLine + '…');
            return lines;
          }
          currentLine = tryLine;
        }
        lines.push(currentLine);
        return lines;
      }
    } else {
      currentLine = testLine;
    }
  }
  if (currentLine.length > 0) lines.push(currentLine);
  return lines;
}

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

// フレーム画像をロード
function loadFrame() {
  const img = new Image();
  img.onload = () => {
    state.frameImage = img;
    redraw();
  };
  img.src = 'data:image/png;base64,' + FRAME_B64;
}

function redraw() {
  ctx.clearRect(0, 0, W, H);

  // 1. 作品画像（フレーム全体 1920x1080 にフィット、クリップなし、回転対応）
  if (state.userImage) {
    const img = state.userImage;
    const scaleToFit = Math.max(W / img.width, H / img.height);
    const baseW = img.width * scaleToFit;
    const baseH = img.height * scaleToFit;
    const drawW = baseW * state.scale;
    const drawH = baseH * state.scale;
    const cx = W/2 + state.offsetX * W/2;
    const cy = H/2 + state.offsetY * H/2;

    if (state.rotation !== 0) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(state.rotation * Math.PI / 180);
      ctx.drawImage(img, -drawW/2, -drawH/2, drawW, drawH);
      ctx.restore();
    } else {
      ctx.drawImage(img, cx - drawW/2, cy - drawH/2, drawW, drawH);
    }
  }

  // 2. フレーム
  if (state.frameImage) {
    ctx.drawImage(state.frameImage, 0, 0, W, H);
  }

  // 3. 作者名（右側タイトルエリア内、ハッシュタグの上）
  //    フレーム内側の金色縦線が x=1544〜1559 にあるので、その右側に配置
  //    エリア: x:1575〜1875 (幅300)
  //    ハッシュタグ上端 ≈ y=830 なので、その上に配置
  //    最大4行、フォントサイズに応じて折り返し
  if (state.authorName.trim()) {
    ctx.fillStyle = '#c9a04a';
    const fontSize = 26;
    ctx.font = `500 ${fontSize}px -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif`;
    ctx.textAlign = 'right';
    ctx.textBaseline = 'alphabetic';

    const maxWidth = 300;
    const maxLines = 4;
    const lineHeight = fontSize * 1.3;
    const rightX = 1875;   // 右揃え基準（フレーム右端から余白）
    const bottomY = 810;   // ハッシュタグの上端(830)からマージン取った位置

    // 「by 」プレフィックスを付けて折り返し処理
    const fullText = 'by ' + state.authorName.trim();
    const lines = wrapText(ctx, fullText, maxWidth, maxLines);

    // 下から上に向かって描画（複数行は上に積み上がる）
    for (let i = 0; i < lines.length; i++) {
      const y = bottomY - (lines.length - 1 - i) * lineHeight;
      ctx.fillText(lines[i], rightX, y);
    }
  }

  document.getElementById('placeholder').style.display = state.userImage ? 'none' : 'block';
}

// ===== イベント =====
document.getElementById('imageInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      state.userImage = img;
      resetTransform();
      redraw();
      updateDownloadBtn();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

function resetTransform() {
  state.scale = 1.0;
  state.offsetX = 0;
  state.offsetY = 0;
  state.rotation = 0;
  document.getElementById('scaleSlider').value = 100;
  document.getElementById('xSlider').value = 0;
  document.getElementById('ySlider').value = 0;
  document.getElementById('rotSlider').value = 0;
  updateSliderLabels();
}

document.getElementById('resetBtn').addEventListener('click', () => {
  resetTransform();
  redraw();
});

document.getElementById('rotSlider').addEventListener('input', (e) => {
  state.rotation = parseInt(e.target.value);
  updateSliderLabels();
  redraw();
});

document.getElementById('rotL90Btn').addEventListener('click', () => {
  // -90度（範囲を-180〜180に正規化）
  let r = state.rotation - 90;
  if (r < -180) r += 360;
  state.rotation = r;
  document.getElementById('rotSlider').value = r;
  updateSliderLabels();
  redraw();
});

document.getElementById('rotR90Btn').addEventListener('click', () => {
  let r = state.rotation + 90;
  if (r > 180) r -= 360;
  state.rotation = r;
  document.getElementById('rotSlider').value = r;
  updateSliderLabels();
  redraw();
});

document.getElementById('scaleSlider').addEventListener('input', (e) => {
  state.scale = parseInt(e.target.value) / 100;
  updateSliderLabels();
  redraw();
});
document.getElementById('xSlider').addEventListener('input', (e) => {
  state.offsetX = parseInt(e.target.value) / 100;
  updateSliderLabels();
  redraw();
});
document.getElementById('ySlider').addEventListener('input', (e) => {
  state.offsetY = parseInt(e.target.value) / 100;
  updateSliderLabels();
  redraw();
});

function updateSliderLabels() {
  document.getElementById('scaleValue').textContent = Math.round(state.scale * 100) + '%';
  document.getElementById('xValue').textContent = Math.round(state.offsetX * 100);
  document.getElementById('yValue').textContent = Math.round(state.offsetY * 100);
  document.getElementById('rotValue').textContent = Math.round(state.rotation) + '°';
}

document.getElementById('nameInput').addEventListener('input', (e) => {
  state.authorName = e.target.value;
  redraw();
});

// ドラッグ
const wrapper = document.getElementById('canvasWrapper');
wrapper.addEventListener('mousedown', startDrag);
wrapper.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) startDrag(e.touches[0]);
}, { passive: true });

function startDrag(e) {
  if (!state.userImage) return;
  state.isDragging = true;
  state.dragStartX = e.clientX;
  state.dragStartY = e.clientY;
  state.initialOffsetX = state.offsetX;
  state.initialOffsetY = state.offsetY;
}

document.addEventListener('mousemove', (e) => doDrag(e));
document.addEventListener('touchmove', (e) => {
  if (e.touches.length === 1) doDrag(e.touches[0]);
}, { passive: true });

function doDrag(e) {
  if (!state.isDragging) return;
  const rect = wrapper.getBoundingClientRect();
  const dx = (e.clientX - state.dragStartX) / rect.width * 2;
  const dy = (e.clientY - state.dragStartY) / rect.height * 2;
  state.offsetX = Math.max(-1, Math.min(1, state.initialOffsetX + dx));
  state.offsetY = Math.max(-1, Math.min(1, state.initialOffsetY + dy));
  document.getElementById('xSlider').value = Math.round(state.offsetX * 100);
  document.getElementById('ySlider').value = Math.round(state.offsetY * 100);
  updateSliderLabels();
  redraw();
}

document.addEventListener('mouseup', () => { state.isDragging = false; });
document.addEventListener('touchend', () => { state.isDragging = false; });

function updateDownloadBtn() {
  document.getElementById('downloadBtn').disabled = !state.userImage;
}

document.getElementById('downloadBtn').addEventListener('click', () => {
  try {
    const dateStr = new Date().toISOString().slice(0,10);
    // ファイル名用にサニタイズ（英数字とアンダースコアのみ残す）
    const rawName = state.authorName.trim();
    const safeName = rawName.replace(/[^a-zA-Z0-9_]/g, '') || 'work';
    const filename = 'TCPA_' + safeName + '_' + dateStr + '.png';

    const dataUrl = canvas.toDataURL('image/png');
    const link = document.createElement('a');
    link.download = filename;
    link.href = dataUrl;
    // 一部ブラウザはDOM追加が必要
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  } catch (err) {
    alert('ダウンロードに失敗しました: ' + err.message);
    console.error(err);
  }
});

loadFrame();
</script>
</body>
